<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python to JS ASCII Converter</title>
    <style>
        /* Dark mode feels right for ASCII art */
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: "Courier New", Courier, monospace;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
        }
        #ascii-art { 
            font-size: 10px; 
            line-height: 10px; /* Tight line height makes blocks touch */
            letter-spacing: 0px;
            white-space: pre; 
            background-color: #000;
        }
        .controls { margin-bottom: 20px; border: 1px solid #444; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>ASCII Art Generator</h2>
        <input type="file" id="upload" accept="image/*">
    </div>

    <pre id="ascii-art"></pre>

    <script src="script.js"></script>
</body>
</html>
